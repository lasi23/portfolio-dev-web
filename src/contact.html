<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Contact — Silvère LAURENT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lora:wght@400;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/contact.css">
</head>
<body>

    <a class="btn-retour" href="../index.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        Accueil
    </a>

    <main>
        <div class="card-contact">

            <div class="card-entete">
                <span class="icone-feuille" aria-hidden="true">🌿</span>
                <h1>Me contacter</h1>
            </div>

            <form action="https://formsubmit.co/b684b56617b08d468df4155d7c711831" method="POST" novalidate>

                <!-- anti-spam formsubmit -->
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="Nouveau message depuis le portfolio">

                <div class="groupe-double">
                    <div class="champ">
                        <label for="name">Nom</label>
                        <input type="text" name="nom" id="name" placeholder="Laurent" required>
                    </div>
                    <div class="champ">
                        <label for="surname">Prénom</label>
                        <input type="text" name="prenom" id="surname" placeholder="Silvère" required>
                    </div>
                </div>

                <div class="champ">
                    <label for="mail">Adresse e-mail</label>
                    <input type="email" name="mail" id="mail" placeholder="vous@exemple.fr" required>
                </div>

                <div class="champ">
                    <label for="phone">Téléphone <span class="optionnel">(optionnel)</span></label>
                    <input type="tel" name="telephone" id="phone" placeholder="06 XX XX XX XX">
                </div>

                <div class="champ">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="5" placeholder="Bonjour Silvère, je souhaite…" required></textarea>
                </div>

                <button type="submit" class="btn-envoyer">
                    Envoyer le message
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>

            </form>
        </div>
    </main>

</body>
</html>
