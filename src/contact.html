<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacte</title>
    <link rel="stylesheet" href="../asset/css/contact.css">
</head>
<body>
    <header>
        <h1>
            Formulaire de contact
        </h1>
    </header>
    <main>
        <fieldset><legend>Formulaire de contact</legend>
            <label for="name">Nom :</label>
            <input type="text" id="name" required value="Jonh">
            <label for="surname">Prénom :</label>
            <input type="text" id="surname" required value="Doe">
            <label for="mail">Mail :</label>
            <input type="email" id="mail" required value="jonhDoe@net.fr">
            <label for="phone">Téléphone :</label>
            <input type="tel" id="phone" required value="06XXXXXXXX">
            <label for="message">Message :</label>
            <input type="text">
        </fieldset>
    </main>
</body>
</html>
